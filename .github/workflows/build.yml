on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: dev-vinicius-andrade/zmk/.github/workflows/build-user-config.yml@feature/multiple-dongles

  release:
    name: Publish GitHub Release
    needs: build
    # Only publish on direct pushes to master, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create firmware zip bundle
        run: |
          cd firmware
          zip -r ../firmware.zip . -i "*.uf2"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: "Firmware ${{ steps.date.outputs.date }} (build #${{ github.run_number }})"
          generate_release_notes: true
          files: |
            firmware/**/*.uf2
            firmware.zip
