CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

CONFIG_ZMK_STUDIO=y

# Mouse
CONFIG_ZMK_POINTING=y

# better connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Connectivity
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Dual-dongle support: allow peripherals to store up to 2 central (dongle) bond slots.
# Slot 0 = home dongle, Slot 1 = work/travel dongle.
# Switching is automatic based on availability of bonded dongles.
CONFIG_ZMK_SPLIT_PERIPHERAL_DONGLE_PROFILES=2

# Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
