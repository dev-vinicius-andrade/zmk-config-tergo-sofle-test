CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

CONFIG_ZMK_STUDIO=y

# Mouse
CONFIG_ZMK_POINTING=y

# better connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Connectivity
# Multi-dongle support: allow peripherals to store multiple central (dongle) bond slots.
# Current setup uses 3 slots (for example: home, work, travel).
# Switching is automatic based on availability of bonded dongles.
CONFIG_ZMK_SPLIT_PERIPHERAL_DONGLE_PROFILES=3

# Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
